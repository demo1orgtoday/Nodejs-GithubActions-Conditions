name: editContinuous Integration for Nodejs source code
on: 
   push:
    branches: 
      - master
      - dev 
jobs:
  nodejsIntegration:
    runs-on: ubuntu-latest
    steps:
      - name: Setup nodejs and npm
        uses: actions/setup-node@v6
        with:
          node-version: '18'
      - name: Copy source code on runner VM 
        uses: actions/checkout@v6
      - name: Install dependencies 
        run: npm ci
      - name: Run tests and build
        run: npm run build
      - name: Deploy Code 
        run: echo "Deploying code to server"
